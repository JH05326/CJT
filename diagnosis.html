<div class="main">

</div>

<div class="modal-overlay" id="addModal">

      <button class="modal-close" onclick="closeAddDialog()">\u2715</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>仪器名称</label>
        <select id="formCategory">
          <option value="GC">GC - 气相色谱</option>
          <option value="HPLC">HPLC - 液相色谱</option>
          <option value="ICP">ICP - 电感耦合等离子体</option>
          <option value="TOC">TOC - 总有机碳</option>
          <option value="UV-Vis">UV-Vis - 紫外可见</option>
          <option value="pH">pH - pH计</option>
          <option value="水分">水分 - 水分测定仪</option>
          <option value="电导率">电导率 - 电导率仪</option>
          <option value="天平">天平</option>
          <option value="滴定">滴定 - 自动滴定</option>
          <option value="溶出">溶出 - 溶出仪</option>
          <option value="粘度">粘度 - 旋转粘度计</option>
          <option value="AAS">AAS - 原子吸收</option>

        <textarea id="formCauses" placeholder="每行一个原因和排查方法，例如：&#10;色谱柱污染 → 检查并老化色谱柱&#10;检测器温度不稳 → 确认温控设定"></textarea>

      </div>

        <label>安全提醒（选填）</label>

var FALLBACK_FAULTS = [
{"id":1,"category":"GC","title":"GC 基线漂移","severity":"medium","causes":["色谱柱未平衡","检测器温度不稳","载气流速波动","色谱柱污染"],"steps":["检查色谱柱是否已充分平衡（至少30分钟）","确认检测器温度设定稳定，无波动","检查载气压力/流速是否稳定","如上述正常，可能是色谱柱污染，需要老化或更换"],"safety":"更换色谱柱前确保系统已降温至室温"},
{"id":2,"category":"GC","title":"GC 峰形异常（拖尾/分叉）","severity":"medium","causes":["进样口衬管污染","色谱柱安装不当","进样量过大","活性位点吸附"],"steps":["检查并更换进样口衬管（去活衬管）","检查色谱柱两端安装位置是否正确，插到合适深度","减少进样量，尝试分流模式","检查系统是否有活性位点（如O型圈老化）"],"safety":""},

{"id":4,"category":"GC","title":"GC 无信号/信号极低","severity":"high","causes":["检测器未点火(FID)","检测器头堵塞","气体流量错误","检测器连接线断裂"],"steps":["FID检测器：检查是否点火，氢气和空气流量是否正确","检查检测器收集极/极化板是否堵塞，需要清洗","核对H2、Air、Make-up gas的流量设定","检查检测器信号线连接是否正常","尝试注入标准样确认是否恢复"],"safety":"FID点火前确保氢气流量正常，避免氢气积聚"},

function getCategories() {
  var counts = {};
  faultDB.forEach(function(f) { counts[f.category] = (counts[f.category]||0)+1; });
  return Object.keys(counts).sort();
}

function renderSidebar() {
  var nav = document.getElementById("sidebarNav");
  var cats = getCategories();
  var html = '<div class="nav-item active" data-cat="all"><span class="nav-icon">\u{1F4CB}</span>全部<span class="nav-count">' + faultDB.length + '</span></div>';
  html += '<div class="nav-section-title">仪器分类</div>';
  cats.forEach(function(c) {
    html += '<div class="nav-item" data-cat="' + c + '"><span class="nav-icon">' + (catIcons[c]||"\u{1F527}") + '</span>' + c + '<span class="nav-count">' + (counts[c]||0) + '</span></div>';
  });
  nav.innerHTML = html;
  nav.querySelectorAll(".nav-item").forEach(function(item) {
    item.addEventListener("click", function() {
      nav.querySelectorAll(".nav-item").forEach(function(i) { i.classList.remove("active"); });
      item.classList.add("active");
      currentCategory = item.dataset.cat;
      if (currentMode === "ai") setMode("search");
      renderFaults();
    });
  });
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById("btnSearch").classList.toggle("active", mode === "search");
  document.getElementById("btnAI").classList.toggle("active", mode === "ai");
  var si = document.getElementById("searchInput");
  if (mode === "search") {
    si.placeholder = "搜索故障名称、原因或排查步骤...";
    si.focus();
    renderFaults();
  } else {
    si.placeholder = "描述你的仪器故障，如：GC基线漂移怎么办...";
    si.focus();
    si.value = "";
    document.getElementById("contentArea").innerHTML = '<div class="ai-no-result"><div class="icon">\u{1F916}</div><p>输入你的故障描述，AI帮你诊断</p></div>';
  }
}

function aiSearch(query) {
  if (!query.trim()) return;
  var q = query.toLowerCase();
  var scored = faultDB.map(function(f) {
    var score = 0;
    if (f.title.toLowerCase().indexOf(q) >= 0) score += 100;
    else { var chars = f.title.toLowerCase().split(""); chars.forEach(function(ch) { if (ch.length > 1 && q.indexOf(ch) >= 0) score += 50; }); }
    if (q.indexOf(f.category.toLowerCase()) >= 0) score += 40;
    f.causes.forEach(function(c) { if (c.toLowerCase().indexOf(q) >= 0) score += 20; });
    f.steps.forEach(function(s) { if (s.toLowerCase().indexOf(q) >= 0) score += 15; });
    return { id: f.id, title: f.title, category: f.category, severity: f.severity, causes: f.causes, steps: f.steps, safety: f.safety, score: score };
  }).filter(function(f) { return f.score > 0; }).sort(function(a, b) { return b.score - a.score; });

  if (scored.length === 0) {
    document.getElementById("contentArea").innerHTML = '<div class="ai-no-result"><div class="icon">\u{1F914}</div><p>暂时没找到匹配的故障记录<br><span style="font-size:12px">试试其他关键词，或切换搜索模式</span></p></div>';
    return;
  }
  var top = scored[0], others = scored.slice(1, 5);
  var html = '<div class="ai-result-panel active"><div class="ai-result-content">';
  html += '<div class="ai-result-title">\u{1F52C} AI 诊断结果</div>';
  html += '<div class="ai-result-question">\u2753 你的问题："' + escapeHtml(query) + '"</div>';
  html += '<div class="ai-result-section"><h3>\u{1F3AF} 最可能的故障：' + top.title + '</h3>';
  var sevText = top.severity === "high" ? "\u{1F534} 紧急" : top.severity === "medium" ? "\u{1F7E1} 一般" : "\u{1F7E2} 轻微";
  var sevClass = top.severity === "high" ? "sev-high" : top.severity === "medium" ? "sev-medium" : "sev-low";
  html += '<div class="ai-result-severity ' + sevClass + '">' + sevText + '</div>';
  html += '<div class="ai-result-section"><h3>\u{1F50D} 可能原因</h3><ul>';
  top.causes.forEach(function(c) { html += '<li>' + c + '</li>'; });
  html += '</ul></div>';
  html += '<div class="ai-result-section ai-result-steps"><h3>\u{1F527} 排查步骤</h3><ol>';
  top.steps.forEach(function(s) { html += '<li>' + s + '</li>'; });
  html += '</ol></div>';
  if (top.safety) html += '<div class="ai-result-safety">\u26A0\uFE0F ' + top.safety + '</div>';
  html += '</div>';
  if (others.length > 0) {
    html += '<div class="ai-result-section"><h3>\u{1F4CB} 相关故障</h3>';
    others.forEach(function(f) {
      var st = f.severity === "high" ? "\u{1F534}" : f.severity === "medium" ? "\u{1F7E1}" : "\u{1F7E2}";
      html += '<div class="ai-recommend" onclick="expandFault(' + f.id + ')"><div class="ai-recommend-title">' + f.category + ' - ' + f.title + '</div><div class="ai-recommend-meta"><span class="' + st + '"></span>' + f.causes.length + '个原因</div></div>';
    });
    html += '</div>';
  }
  html += '</div></div>';
  document.getElementById("contentArea").innerHTML = html;
}

function expandFault(id) {
  var f = faultDB.find(function(x) { return x.id === id; });
  if (!f) return;
  var sevText = f.severity === "high" ? "\u{1F534} 紧急" : f.severity === "medium" ? "\u{1F7E1} 一般" : "\u{1F7E2} 轻微";
  var sevClass = f.severity === "high" ? "sev-high" : f.severity === "medium" ? "sev-medium" : "sev-low";
  var html = '<div class="ai-result-panel active"><div class="ai-result-content">';
  html += '<div class="ai-result-title">\u{1F52C} ' + f.title + '</div>';
  html += '<div class="ai-result-severity ' + sevClass + '">' + sevText + '</div>';
  html += '<div class="ai-result-section"><h3>\u{1F50D} 可能原因</h3><ul>';
  f.causes.forEach(function(c) { html += '<li>' + c + '</li>'; });
  html += '</ul></div>';
  html += '<div class="ai-result-section ai-result-steps"><h3>\u{1F527} 排查步骤</h3><ol>';
  f.steps.forEach(function(s) { html += '<li>' + s + '</li>'; });
  html += '</ol></div>';
  if (f.safety) html += '<div class="ai-result-safety">\u26A0\uFE0F ' + f.safety + '</div>';
  html += '</div></div>';
  document.getElementById("contentArea").innerHTML = html;
}

function escapeHtml(t) { return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>"); }

function renderFaults() {
  var area = document.getElementById("contentArea");
  var filtered = faultDB.filter(function(f) {
    var matchCat = currentCategory === "all" || f.category === currentCategory;
    var matchSearch = !searchQuery || f.title.toLowerCase().indexOf(searchQuery) >= 0 || f.category.toLowerCase().indexOf(searchQuery) >= 0 || f.causes.some(function(c) { return c.toLowerCase().indexOf(searchQuery) >= 0; }) || f.steps.some(function(s) { return s.toLowerCase().indexOf(searchQuery) >= 0; });
    return matchCat && matchSearch;
  });
  area.innerHTML = '';
  var stats = document.createElement("div");
  stats.className = "toolbar-stats";
  stats.style.cssText = "padding:0 24px 8px;";
  stats.innerHTML = '共 <span>' + faultDB.length + '</span> 条 &nbsp;|&nbsp; 显示 <span>' + filtered.length + '</span> 条';
  area.appendChild(stats);
  if (filtered.length === 0) {
    area.innerHTML += '<div class="empty-state"><div class="icon">\u{1F50D}</div><p>没有找到匹配的故障记录</p></div>';
    return;
  }
  filtered.forEach(function(f) {
    var sevText = f.severity === "high" ? "紧急" : f.severity === "medium" ? "一般" : "轻微";
    var badgeClass = "badge-" + (catClassMap[f.category] || "gc");
    var card = document.createElement("div");
    card.className = "fault-card";
    card.id = "card-" + f.id;
    card.innerHTML = '<div class="fault-card-header" onclick="toggleCard(' + f.id + ')"><div class="fault-card-left"><div class="fault-title">' + f.title + '</div><div class="fault-meta"><span class="fault-badge ' + badgeClass + '">' + f.category + '</span><span><span class="severity-dot dot-' + f.severity + '"></span><span class="severity-text">' + sevText + '</span></span><span class="cause-count">' + f.causes.length + ' 个原因</span></div></div><span class="fault-arrow">\u25BC</span></div><div class="fault-card-body"><div class="section-title">\u{1F50D} 可能原因</div><ul class="cause-list">' + f.causes.map(function(c) { return '<li>' + c + '</li>'; }).join("") + '</ul><div class="section-title">\u{1F527} 排查步骤</div><ol class="step-list">' + f.steps.map(function(s) { return '<li>' + s + '</li>'; }).join("") + '</ol>' + (f.safety ? '<div class="safety-box">\u26A0\uFE0F ' + f.safety + '</div>' : '') + '</div>';
    area.appendChild(card);
  });
}

function toggleCard(id) {
  document.getElementById("card-" + id).classList.toggle("open");
}

document.getElementById("searchInput").addEventListener("input", function(e) {
  searchQuery = e.target.value.toLowerCase().trim();
  if (currentMode === "search") renderFaults();
  else aiSearch(e.target.value.trim());
});
document.getElementById("searchInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && currentMode === "ai") aiSearch(e.target.value.trim());
});

function showAddDialog() {
  document.getElementById("addModal").classList.add("active");
  document.getElementById("formTitle").focus();
}
function closeAddDialog() {
  document.getElementById("addModal").classList.remove("active");
  resetForm();
}
document.addEventListener("DOMContentLoaded", function() {
  var overlay = document.getElementById("addModal");
  if (overlay) overlay.addEventListener("click", function(e) { if (e.target === overlay) closeAddDialog(); });
});

async function submitFault() {
  var title = document.getElementById("formTitle").value.trim();
  var category = document.getElementById("formCategory").value;
  var causesText = document.getElementById("formCauses").value.trim();
  var stepsText = document.getElementById("formSteps").value.trim();
  var safety = document.getElementById("formSafety").value.trim();
  if (!title) { showFormStatus("请填写故障表现形式", "error"); return; }
  if (!causesText) { showFormStatus("请填写可能原因及排查方式", "error"); return; }
  if (!stepsText) { showFormStatus("请填写解决方式", "error"); return; }
  var causes = causesText.split("\n").map(function(s) { return s.trim(); }).filter(Boolean);
  var steps = stepsText.split("\n").map(function(s) { return s.trim(); }).filter(Boolean);
  if (causes.length === 0 || steps.length === 0) { return; }
  var loading = document.getElementById("formLoading");
  var submitBtn = document.getElementById("btnSubmit");
  loading.style.display = "block";
  submitBtn.disabled = true;
  var statusEl = document.getElementById("formStatus");
  statusEl.style.display = "none";
  statusEl.className = "form-status";
  try {
    console.log("\u{1F4E5} Reading cloud DB...");
    var resp = await fetch(FAULTS_JSON_URL);
    if (!resp.ok) throw new Error("无法读取云端数据 (HTTP " + resp.status + ")");
    var data = await resp.json();
    console.log("\u2705 Read " + data.length + " records");
    var maxId = data.reduce(function(max, f) { return Math.max(max, f.id || 0); }, 0);
    var newFault = { id: maxId + 1, category: category, title: title, severity: "medium", causes: causes, steps: steps, safety: safety || "" };
    data.push(newFault);
    console.log("\u{1F4E4} Uploading...");
    var filePath = "%E4%BB%AA%E5%99%A8%E6%95%85%E9%9A%9C%E6%95%B0%E6%8D%AE%E5%BA%93";
    var branchResp = await fetch("https://api.github.com/repos/JH05326/CJT/branches/main", {
      headers: { "Authorization": "token " + GITHUB_TOKEN, "X-GitHub-Api-Version": "2022-11-28" }
    });
    var sha;
    if (branchResp.ok) { sha = (await branchResp.json()).commit.sha; }
    else throw new Error("无法获取分支信息 (HTTP " + branchResp.status + ")");
    var putResp = await fetch("https://api.github.com/repos/JH05326/CJT/contents/" + filePath, {
      method: "PUT",
      headers: { "Authorization": "token " + GITHUB_TOKEN, "X-GitHub-Api-Version": "2022-11-28", "Content-Type": "application/json" },
      body: JSON.stringify({ message: "feat: add fault - " + title, content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))), sha: sha, branch: "main" })
    });
    if (!putResp.ok) {
      var errMsg = "上传失败 (HTTP " + putResp.status + ")";
      try { var ed = await putResp.json(); errMsg = ed.message || errMsg; } catch(e) {}
      throw new Error(errMsg);
    }
    console.log("\u2705 Upload successful");
    loading.style.display = "none";
    showFormStatus("\u2705 提交成功！新增故障「" + title + "」已上传到云端，共 " + data.length + " 条。", "success");
    resetForm();
    setTimeout(function() { closeAddDialog(); }, 2500);
    await loadFaults();
  } catch (err) {
    loading.style.display = "none";
    console.error("\u274C Error:", err);
    showFormStatus("\u274C 提交失败：" + err.message, "error");
  } finally {
    submitBtn.disabled = false;
  }
}

function showFormStatus(msg, type) {
  var el = document.getElementById("formStatus");
  el.className = "form-status " + type;
  el.textContent = msg;
}

function resetForm() {
  document.getElementById("formTitle").value = "";
  document.getElementById("formCauses").value = "";
  document.getElementById("formSteps").value = "";
  document.getElementById("formSafety").value = "";
  document.getElementById("formCategory").selectedIndex = 0;
  document.getElementById("formStatus").style.display = "none";
  document.getElementById("formStatus").className = "form-status";
}

async function loadFaults() {
  try {
    var resp = await fetch(FAULTS_JSON_URL);
    if (resp.ok) {
      faultDB = await resp.json();
      console.log("\u2705 Cloud DB loaded: " + faultDB.length + " records");
    } else { throw new Error("HTTP " + resp.status); }
  } catch (err) {
    console.warn("\u26A0 Failed to load cloud DB, using fallback: " + err.message);
    faultDB = FALLBACK_FAULTS;
  }
  renderSidebar();
  renderFaults();
}

loadFaults();
</script>
</body>
